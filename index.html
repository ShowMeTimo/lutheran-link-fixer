<!DOCTYPE html>
<html>
<head>
  <title>Confessional Lutheran Companion</title>
</head>
<body>

<h2>Confessional Lutheran Companion</h2>

<textarea id="input" placeholder="Ask something..." style="width:100%;height:100px;"></textarea>
<button onclick="askGPT()">Generate</button>

<h3>Response:</h3>
<pre id="output"></pre>

<script>
let linkmap = null;

// load your JSON
fetch("book_of_concord_LINKMAP_CPH_ONLY.json")
  .then(res => res.json())
  .then(data => linkmap = data);

async function askGPT() {
  const prompt = document.getElementById("input").value;

  const response = await fetch("/api/gpt", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ prompt })
}), {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_API_KEY_HERE",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  let text = data.choices[0].message.content;

  text = fixLinks(text);

  document.getElementById("output").innerText = text;
}

function fixLinks(text) {
  if (!linkmap) return text;

  return text.replace(/https?:\/\/bookofconcord\.org\/[^ )]*/gi, (match) => {

    for (const entry of linkmap.entries) {

      if (match.toLowerCase().includes("article-iv") && entry.display.includes("Article IV")) {
        return entry.url;
      }

      if (match.toLowerCase().includes("baptism") && entry.display.includes("Baptism")) {
        return entry.url;
      }

      if (match.toLowerCase().includes("lords-prayer") && entry.display.includes("Lord’s Prayer")) {
        return entry.url;
      }
    }

    return "";
  });
}
</script>

</body>
</html>
